<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUMIÈRE — Элитные Знакомства</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --gold: #c9a962;
      --gold-dark: #9a7d3e;
      --bg: #08080a;
      --card: #121214;
      --text: #f0f0f0;
      --muted: #666;
    }
    
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }
    
    .screen { display: none; height: 100vh; width: 100%; position: relative; }
    .screen.active { display: flex; flex-direction: column; }
    
    /* === ANIMATED BACKGROUND === */
    .bg-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 20% 20%, rgba(201,169,98,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(201,169,98,0.05) 0%, transparent 50%),
                  var(--bg);
    }
    
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.3;
      animation: orbMove 20s ease-in-out infinite;
    }
    
    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--gold);
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 300px;
      height: 300px;
      background: var(--gold-dark);
      bottom: -50px;
      right: -50px;
      animation-delay: -10s;
    }
    
    .orb-3 {
      width: 200px;
      height: 200px;
      background: var(--gold);
      top: 50%;
      right: 20%;
      animation-delay: -5s;
    }
    
    @keyframes orbMove {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.1); }
      50% { transform: translate(-20px, 20px) scale(0.9); }
      75% { transform: translate(20px, 30px) scale(1.05); }
    }
    
    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--gold);
      border-radius: 50%;
      animation: particleFloat 15s linear infinite;
    }
    
    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }
    
    /* === AUTH SCREEN === */
    .auth-screen {
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 10;
    }
    
    .logo-reg {
      font-family: 'Cinzel', serif;
      font-size: clamp(36px, 11vw, 52px);
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 8px;
      margin-bottom: 8px;
      text-shadow: 0 0 50px rgba(201,169,98,0.5);
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    
    @keyframes logoGlow {
      from { text-shadow: 0 0 30px rgba(201,169,98,0.4); }
      to { text-shadow: 0 0 60px rgba(201,169,98,0.7); }
    }
    
    .tagline {
      color: var(--muted);
      font-size: clamp(10px, 3vw, 13px);
      margin-bottom: clamp(35px, 10vw, 60px);
      letter-spacing: 4px;
    }
    
    .auth-form {
      width: 100%;
      max-width: 340px;
      background: rgba(18,18,20,0.85);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(201,169,98,0.15);
      border-radius: 24px;
      padding: 30px;
      animation: formSlide 0.6s ease;
    }
    
    @keyframes formSlide {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .tabs {
      display: flex;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }
    
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab:hover { color: var(--text); }
    
    .form-title {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .input {
      width: 100%;
      padding: 16px 18px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s;
    }
    
    .input:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(201,169,98,0.06);
    }
    
    .input::placeholder { color: #555; }
    
    .btn-primary {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border: none;
      border-radius: 14px;
      color: #08080a;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.3s;
    }
    
    .btn-primary:active { transform: scale(0.97); }
    
    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.3s;
    }
    
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
    
    /* === MAIN SCREEN === */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      background: linear-gradient(180deg, rgba(8,8,10,0.95) 0%, transparent 100%);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 3px;
    }
    
    .user-info { display: flex; align-items: center; gap: 10px; }
    
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #08080a;
      font-weight: 600;
      font-size: 14px;
    }
    
    .status-badge {
      padding: 5px 12px;
      background: rgba(201,169,98,0.12);
      border: 1px solid var(--gold);
      border-radius: 20px;
      font-size: 10px;
      color: var(--gold);
    }
    
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 15px 170px;
      position: relative;
      z-index: 10;
    }
    
    /* === 3D CARD === */
    .card-container {
      perspective: 1200px;
      width: 90%;
      max-width: 300px;
      height: 430px;
      cursor: grab;
      touch-action: none;
    }
    
    .card {
      width: 100%;
      height: 100%;
      background: var(--card);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(201,169,98,0.15);
      box-shadow: 0 30px 100px rgba(0,0,0,0.7), 0 0 1px rgba(201,169,98,0.2);
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out;
      position: relative;
    }
    
    .card.swiping {
      transition: none;
    }
    
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.85) 100%);
      z-index: 2;
      pointer-events: none;
    }
    
    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px;
      z-index: 3;
    }
    
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 26px;
      font-weight: 500;
      margin-bottom: 4px;
      text-shadow: 0 2px 15px rgba(0,0,0,0.9);
    }
    
    .card-city {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .card-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    
    .card-tag {
      padding: 5px 12px;
      background: rgba(201,169,98,0.15);
      border: 1px solid rgba(201,169,98,0.25);
      border-radius: 15px;
      font-size: 11px;
      color: var(--gold);
    }
    
    /* === STATS === */
    .stats { display: flex; gap: 35px; margin-bottom: 25px; }
    .stat { text-align: center; }
    .stat-value { font-size: 26px; color: var(--gold); font-weight: 600; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
    
    /* === ACTIONS === */
    .actions {
      position: fixed;
      bottom: 25px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 0 20px;
      z-index: 100;
    }
    
    .btn-action {
      width: clamp(60px, 16vw, 70px);
      height: clamp(60px, 16vw, 70px);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(18,18,20,0.9);
      backdrop-filter: blur(15px);
      color: var(--text);
      font-size: clamp(20px, 5vw, 26px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .btn-action:active { transform: scale(0.9); }
    
    .btn-action.like {
      width: clamp(70px, 19vw, 80px);
      height: clamp(70px, 19vw, 80px);
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border-color: var(--gold);
      color: #08080a;
      font-size: clamp(24px, 6vw, 30px);
      box-shadow: 0 10px 40px rgba(201,169,98,0.45);
    }
    
    .btn-action.liked {
      animation: likePop 0.4s ease;
    }
    
    @keyframes likePop {
      0% { transform: scale(1); }
      40% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }
    
    .btn-action.super { color: #55b3ff; border-color: rgba(85,179,255,0.3); }
    .btn-action.skip:active { border-color: #ff5555; color: #ff5555; }
    
    /* === MEMBERSHIP BTN === */
    .membership-btn {
      position: fixed;
      bottom: 115px;
      right: 15px;
      background: rgba(18,18,20,0.9);
      backdrop-filter: blur(15px);
      border: 1px solid var(--gold);
      border-radius: 25px;
      padding: 12px 18px;
      color: var(--gold);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.3s;
    }
    
    .membership-btn:active { transform: scale(0.95); }
    .membership-btn::before { content: '★'; font-size: 11px; }
    
    /* === TOAST === */
    .toast {
      position: fixed;
      top: 85px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--card);
      border: 1px solid var(--gold);
      padding: 14px 26px;
      border-radius: 14px;
      font-size: 14px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    /* === MATCH MODAL === */
    .match-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 300;
      flex-direction: column;
      animation: fadeIn 0.4s ease;
    }
    
    .match-modal.show { display: flex; }
    
    .match-modal h2 {
      font-family: 'Cinzel', serif;
      font-size: clamp(32px, 10vw, 48px);
      color: var(--gold);
      margin-bottom: 12px;
      animation: matchPulse 1.2s ease infinite;
    }
    
    @keyframes matchPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    
    .match-modal p { color: var(--muted); margin-bottom: 35px; }
    .match-modal .btn-primary { max-width: 220px; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- АНИМИРОВАННЫЙ ФОН -->
  <div class="bg-animated">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  
  <!-- ЧАСТИЦЫ -->
  <div class="particles" id="particles"></div>
  
  <!-- ЭКРАН АВТОРИЗАЦИИ -->
  <div class="screen auth-screen active" id="authScreen">
    <div class="logo-reg">LUMIÈRE</div>
    <p class="tagline">ЭЛИТНЫЕ ЗНАКОМСТВА</p>
    
    <div class="tabs">
      <div class="tab active" data-tab="login">Вход</div>
      <div class="tab" data-tab="register">Регистрация</div>
    </div>
    
    <form class="auth-form" id="loginForm">
      <p class="form-title">С возвращением</p>
      <input type="email" class="input" placeholder="Email" required>
      <input type="password" class="input" placeholder="Пароль" required>
      <button type="submit" class="btn-primary">Войти</button>
      <button type="button" class="btn-secondary" onclick="showApp()">Пропустить</button>
    </form>
    
    <form class="auth-form" id="registerForm" style="display:none;">
      <p class="form-title">Создать аккаунт</p>
      <input type="text" class="input" placeholder="Ваше имя" required>
      <input type="email" class="input" placeholder="Email" required>
      <input type="password" class="input" placeholder="Пароль" required>
      <button type="submit" class="btn-primary">Зарегистрироваться</button>
    </form>
  </div>
  
  <!-- ГЛАВНЫЙ ЭКРАН -->
  <div class="screen main-screen" id="mainScreen">
    <header class="header">
      <div class="logo">LUMIÈRE</div>
      <div class="user-info">
        <span class="status-badge" id="planBadge">Member</span>
        <div class="user-avatar" id="userAvatar">?</div>
      </div>
    </header>
    
    <div class="content">
      <div class="stats">
        <div class="stat">
          <p class="stat-value" id="likesLeft">5</p>
          <p class="stat-label">Лайков</p>
        </div>
        <div class="stat">
          <p class="stat-value" id="matchesCount">0</p>
          <p class="stat-label">Мэтчей</p>
        </div>
      </div>
      
      <div class="card-container" id="cardContainer">
        <div class="card" id="card">
          <img class="card-img" id="cardImg" src="" alt="Фото">
          <div class="card-info">
            <h2 class="card-name" id="cardName">Принцесса Алина</h2>
            <p class="card-city" id="cardCity">Москва, 26</p>
            <div class="card-tags" id="cardTags"></div>
          </div>
        </div>
      </div>
    </div>
    
    <button class="membership-btn" id="membershipBtn">Элита</button>
    
    <div class="actions">
      <button class="btn-action skip" id="skipBtn">✕</button>
      <button class="btn-action like" id="likeBtn">♥</button>
      <button class="btn-action super" id="superBtn">★</button>
    </div>
  </div>
  
  <!-- MATCH MODAL -->
  <div class="match-modal" id="matchModal">
    <h2>✨ МЭТЧ!</h2>
    <p id="matchName">Вы понравились друг другу!</p>
    <button class="btn-primary" onclick="closeMatch()">Продолжить</button>
  </div>
  
  <div class="toast" id="toast"></div>

  <script>
    // === CREATE PARTICLES ===
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 15 + 's';
      p.style.animationDuration = (12 + Math.random() * 8) + 's';
      p.style.width = (2 + Math.random() * 3) + 'px';
      p.style.height = p.style.width;
      particlesContainer.appendChild(p);
    }
    
    // === PROFILES ===
    const profiles = [
      { name: "Принцесса Алина", age: 26, city: "Москва", tags: ["Культура", "Путешествия"], img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800&q=80" },
      { name: "Граф Егор", age: 29, city: "Санкт-Петербург", tags: ["Бизнес", "Искусство"], img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800&q=80" },
      { name: "Маркиза София", age: 24, city: "Казань", tags: ["Искусство", "Галерея"], img: "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=800&q=80" },
      { name: "Барон Максим", age: 31, city: "Екатеринбург", tags: ["IT", "Путешествия"], img: "https://images.unsplash.com/photo-1504257432389-52343af06ae3?w=800&q=80" },
      { name: "Герцогиня Полина", age: 27, city: "Новосибирск", tags: ["Бизнес", "Карьера"], img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=800&q=80" },
      { name: "Виконт Данил", age: 28, city: "Краснодар", tags: ["Вино", "Спорт"], img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80" },
      { name: "Графиня Мария", age: 30, city: "Нижний Новгород", tags: ["Архитектура", "Искусство"], img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800&q=80" },
      { name: "Лорд Илья", age: 25, city: "Ростов-на-Дону", tags: ["Инвестиции", "Хайкинг"], img: "https://images.unsplash.com/photo-1504593811423-6dd665756598?w=800&q=80" }
    ];
    
    let index = 0;
    let likes = 5;
    let matches = [];
    let elite = false;
    let userName = 'Пользователь';
    let isAnimating = false;
    let isDragging = false;
    let startX = 0, startY = 0;
    let currentX = 0, currentY = 0;
    
    // === CARD 3D DRAG ===
    const card = document.getElementById('card');
    const cardContainer = document.getElementById('cardContainer');
    
    function updateCardTransform() {
      const rotateY = currentX * 0.08;
      const rotateX = -currentY * 0.08;
      const translateX = currentX;
      card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateX(${translateX}px)`;
    }
    
    cardContainer.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      card.classList.remove('swiping');
    });
    
    cardContainer.addEventListener('touchstart', (e) => {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      card.classList.remove('swiping');
    }, { passive: true });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      currentX = e.clientX - startX;
      currentY = e.clientY - startY;
      updateCardTransform();
    });
    
    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      currentX = e.touches[0].clientX - startX;
      currentY = e.touches[0].clientY - startY;
      updateCardTransform();
    }, { passive: true });
    
    document.addEventListener('mouseup', () => {
      if (Math.abs(currentX) > 80) {
        swipe(currentX > 0 ? 'right' : 'left');
      } else {
        resetCard();
      }
      isDragging = false;
    });
    
    document.addEventListener('touchend', () => {
      if (Math.abs(currentX) > 80) {
        swipe(currentX > 0 ? 'right' : 'left');
      } else {
        resetCard();
      }
      isDragging = false;
    });
    
    function resetCard() {
      card.classList.add('swiping');
      currentX = 0;
      currentY = 0;
      card.style.transition = 'transform 0.3s ease';
      updateCardTransform();
      setTimeout(() => {
        card.style.transition = 'transform 0.15s ease-out';
      }, 300);
    }
    
    // === TABS ===
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('loginForm').style.display = tab.dataset.tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab.dataset.tab === 'register' ? 'block' : 'none';
      });
    });
    
    // === AUTH ===
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = e.target.querySelector('input[type="email"]').value;
      userName = email.split('@')[0] || 'Пользователь';
      document.getElementById('userAvatar').textContent = userName[0].toUpperCase();
      showApp();
      showToast('С возвращением, ' + userName + '!');
    });
    
    document.getElementById('registerForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = e.target.querySelector('input[type="text"]').value;
      userName = name;
      document.getElementById('userAvatar').textContent = name[0].toUpperCase();
      showApp();
      showToast('Добро пожаловать, ' + name + '!');
    });
    
    function showApp() {
      document.getElementById('authScreen').classList.remove('active');
      document.getElementById('mainScreen').classList.add('active');
    }
    
    // === RENDER ===
    function render() {
      const p = profiles[index];
      document.getElementById('cardImg').src = p.img;
      document.getElementById('cardName').textContent = p.name;
      document.getElementById('cardCity').textContent = `${p.city}, ${p.age}`;
      document.getElementById('cardTags').innerHTML = p.tags.map(t => `<span class="card-tag">${t}</span>`).join('');
    }
    
    function next() {
      index = (index + 1) % profiles.length;
      currentX = 0;
      currentY = 0;
      render();
      card.style.transition = 'none';
      updateCardTransform();
      setTimeout(() => {
        card.style.transition = 'transform 0.15s ease-out';
      }, 50);
    }
    
    // === SWIPE ===
    function swipe(direction) {
      if (isAnimating) return;
      isAnimating = true;
      
      const targetX = direction === 'left' ? -window.innerWidth * 1.5 : window.innerWidth * 1.5;
      const targetRotate = direction === 'left' ? -45 : 45;
      
      card.classList.add('swiping');
      card.style.transition = 'all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
      card.style.transform = `perspective(1200px) rotateY(${targetRotate}deg) translateX(${targetX}px)`;
      card.style.opacity = '0';
      
      setTimeout(() => {
        card.style.opacity = '';
        next();
        isAnimating = false;
      }, 400);
    }
    
    // === ACTIONS ===
    document.getElementById('likeBtn').addEventListener('click', () => {
      if (!elite && likes <= 0) {
        showToast('Лимит исчерпан! Станьте Элитой');
        return;
      }
      if (!elite) likes--;
      document.getElementById('likesLeft').textContent = elite ? '∞' : likes;
      
      const btn = document.getElementById('likeBtn');
      btn.classList.add('liked');
      setTimeout(() => btn.classList.remove('liked'), 400);
      
      if (Math.random() > 0.5) {
        matches.push(profiles[index]);
        document.getElementById('matchesCount').textContent = matches.length;
        setTimeout(() => showMatch(profiles[index].name), 300);
      } else {
        showToast(`♥ Лайк ${profiles[index].name}`);
      }
      swipe('right');
    });
    
    document.getElementById('skipBtn').addEventListener('click', () => swipe('left'));
    
    document.getElementById('superBtn').addEventListener('click', () => {
      if (!elite) {
        showToast('Суперлайк — только для Элиты!');
        return;
      }
      matches.push(profiles[index]);
      document.getElementById('matchesCount').textContent = matches.length;
      showMatch(profiles[index].name);
      swipe('left');
    });
    
    document.getElementById('membershipBtn').addEventListener('click', () => {
      elite = true;
      document.getElementById('planBadge').textContent = 'Элита';
      document.getElementById('likesLeft').textContent = '∞';
      showToast('🎉 Добро пожаловать в Элиту!');
    });
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }
    
    function showMatch(name) {
      document.getElementById('matchName').textContent = `Вы и ${name} понравились друг другу!`;
      document.getElementById('matchModal').classList.add('show');
    }
    
    function closeMatch() {
      document.getElementById('matchModal').classList.remove('show');
    }
    
    // === INIT ===
    render();
  </script>
</body>
</html>
