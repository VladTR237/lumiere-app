<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIOLET CROWN — Заявка</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08070d;
      --card: rgba(18, 14, 30, 0.85);
      --line: rgba(185, 154, 255, 0.22);
      --text: #f5f0ff;
      --muted: #9a8fb0;
      --violet: #7d44e6;
      --violet-light: #bb8cff;
      --violet-soft: #a26bff;
      --shadow: 0 20px 60px rgba(10, 2, 28, 0.6);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse at 30% 10%, rgba(125,68,230,0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 90%, rgba(187,140,255,0.08) 0%, transparent 40%),
                  var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px;
    }
    .ambient {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: -1;
    }
    .ambient-1 {
      width: 400px; height: 400px;
      top: -150px; right: -100px;
      background: rgba(125,68,230,0.35);
    }
    .ambient-2 {
      width: 300px; height: 300px;
      bottom: -100px; left: -80px;
      background: rgba(93,45,170,0.3);
    }
    .container { max-width: 1100px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      flex-wrap: wrap;
      gap: 15px;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #d6b8ff 0%, #fff 50%, #d6b8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shine 3s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 10px 18px;
      border: 1px solid var(--line);
      border-radius: 30px;
      font-size: 13px;
      transition: all 0.3s;
    }
    nav a:hover, nav a.active {
      background: var(--violet);
      color: #130a20;
      border-color: var(--violet);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      margin: 20px auto;
      max-width: 600px;
    }
    .kicker {
      color: var(--violet-light);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 500;
      margin: 15px 0;
    }
    .form-grid { display: grid; gap: 18px; margin-top: 20px; }
    .form-grid label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .form-grid input, .form-grid textarea, .form-grid select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .form-grid input:focus, .form-grid textarea:focus, .form-grid select:focus {
      border-color: var(--violet-soft);
      outline: none;
      box-shadow: 0 0 0 3px rgba(125,68,230,0.2);
    }
    .form-grid textarea { min-height: 100px; resize: vertical; }
    .btn {
      padding: 14px 28px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      width: 100%;
      margin-top: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--violet), var(--violet-light));
      color: #130a20;
    }
    .btn:hover { transform: translateY(-2px); }
    .success {
      color: #6bffb8;
      text-align: center;
      margin-top: 20px;
      display: none;
    }
    .success.show { display: block; }
    
    @media (max-width: 600px) {
      header { flex-direction: column; text-align: center; }
      .card { padding: 25px; }
    }
  </style>
</head>
<body>
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>
  
  <div class="container">
    <header>
      <a href="index.html" class="brand">VIOLET CROWN</a>
      <nav>
        <a href="index.html">Главная</a>
        <a href="invite.html">Вход</a>
        <a href="apply.html" class="active">Заявка</a>
        <a href="members.html">Участники</a>
        <a href="profile.html">Профиль</a>
      </nav>
    </header>

    <div class="card">
      <p class="kicker">ПОДАЧА ЗАЯВКИ</p>
      <h1>Стать кандидатом</h1>
      <p style="color:var(--muted);margin:15px 0;line-height:1.6;">
        Для вступления требуется рекомендация действующего резидента. Если у вас нет приглашения, оставьте заявку — мы свяжемся с вами.
      </p>
      
      <form id="applyForm" class="form-grid">
        <div>
          <label>Ваше имя</label>
          <input type="text" name="name" required>
        </div>
        <div>
          <label>Город</label>
          <input type="text" name="city" required>
        </div>
        <div>
          <label>Возраст</label>
          <input type="number" name="age" min="18" max="99" required>
        </div>
        <div>
          <label>Профессия</label>
          <input type="text" name="profession" required>
        </div>
        <div>
          <label>Кто рекомендовал?</label>
          <input type="text" name="referrer" placeholder="Имя резидента">
        </div>
        <div>
          <label>Немного о себе</label>
          <textarea name="about" placeholder="Расскажите кратко о себе..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Отправить заявку</button>
        <p class="success" id="success">Спасибо! Ваша заявка отправлена. Мы свяжемся с вами.</p>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('applyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = this.querySelector('.btn-primary');
      btn.textContent = 'Отправлено...';
      btn.disabled = true;
      document.getElementById('success').classList.add('show');
    });
  </script>
</body>
</html>
