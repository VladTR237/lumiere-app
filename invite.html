<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIOLET CROWN — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, sans-serif; background: #08070d; color: #f5f0ff; min-height: 100vh; padding: 20px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: #bb8cff; letter-spacing: 6px; text-align: center; margin: 30px 0; }
    nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
    nav a { color: #b5aacb; text-decoration: none; padding: 12px 20px; border: 1px solid rgba(185,154,255,0.22); border-radius: 30px; }
    nav a.active { background: #7d44e6; color: #130a20; border-color: #7d44e6; }
    .card { background: rgba(18,14,30,0.9); border: 1px solid rgba(185,154,255,0.22); border-radius: 20px; padding: 30px; max-width: 400px; margin: 0 auto; }
    h1 { font-family: 'Playfair Display', serif; font-size: 22px; margin: 15px 0; text-align: center; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; color: #b5aacb; margin-bottom: 8px; }
    .form-group input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(185,154,255,0.22); background: rgba(255,255,255,0.03); color: #f5f0ff; font-size: 14px; }
    .btn { background: #7d44e6; color: #130a20; padding: 14px 24px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; }
    .hint { color: #b5aacb; font-size: 13px; margin-top: 15px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">VIOLET CROWN</div>
  <nav>
    <a href="index.html">Главная</a>
    <a href="invite.html" class="active">Вход</a>
    <a href="apply.html">Заявка</a>
    <a href="members.html">Участники</a>
    <a href="profile.html">Профиль</a>
  </nav>
  <div class="card">
    <p class="kicker" style="color:#bb8cff;font-size:12px;letter-spacing:3px;text-align:center;">ВХОД ПО ПРИГЛАШЕНИЮ</p>
    <h1>Введите код приглашения</h1>
    <form>
      <div class="form-group">
        <label>Код приглашения</label>
        <input type="text" placeholder="VC-2026" id="code">
      </div>
      <button type="button" class="btn" onclick="check()">Продолжить</button>
    </form>
    <p class="hint">Код можно получить от действующего резидента клуба.</p>
  </div>
  <script>
    function check() {
      var code = document.getElementById('code').value.toUpperCase();
      if (code === 'VC-2026' || code === 'VIOLET-CROWN' || code === 'PRIVATE-VC') {
        window.location.href = 'profile.html';
      } else {
        alert('Неверный код. Подайте заявку.');
      }
    }
  </script>
</body>
</html>
